<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimplyDoors Matrix Unroller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius-md: 8px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --transition: all 0.2s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); }
        .fw-normal { font-weight: 400; color: var(--text-muted); }

        /* Main Navigation Bar Update */
        .top-bar {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .brand { display: flex; align-items: center; gap: 0.75rem; color: var(--primary); text-decoration: none; }
        .brand h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0; }
        
        .app-nav { display: flex; gap: 1rem; }
        .nav-link { 
            text-decoration: none; 
            color: var(--text-muted); 
            font-weight: 500; 
            padding: 0.5rem 1rem; 
            border-radius: var(--radius-md); 
            transition: var(--transition);
        }
        .nav-link:hover { background-color: #f1f5f9; color: var(--primary); }
        .nav-link.active { background-color: #eff6ff; color: var(--accent); }

        .header-spacer { width: 300px; } /* Balances the flexbox layout */

        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 1400px; margin: 2rem auto; padding: 0 2rem; height: calc(100vh - 120px); }
        section { display: flex; flex-direction: column; gap: 1.5rem; height: 100%; }

        .config-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; background: var(--bg-card); padding: 1.5rem; border-radius: var(--radius-md); border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        label { font-size: 0.875rem; font-weight: 600; color: var(--text-main); display: flex; flex-direction: column; gap: 0.25rem; }
        .help-text { font-size: 0.75rem; font-weight: 400; color: var(--text-muted); }

        input[type="text"] { padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 0.95rem; outline: none; transition: var(--transition); }
        input[type="text"]:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .matrix-panel { display: flex; flex-direction: column; gap: 0.5rem; flex-grow: 1; }
        textarea { width: 100%; height: 100%; min-height: 300px; padding: 1rem; border: 1px solid var(--border); border-radius: var(--radius-md); font-family: monospace; font-size: 0.9rem; resize: none; outline: none; transition: var(--transition); white-space: pre; }
        #jsonOutput { background-color: #f1f5f9; color: #0f172a; }

        .output-header { display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 0.875rem 1.5rem; font-size: 1rem; font-weight: 600; border: none; border-radius: var(--radius-md); cursor: pointer; transition: var(--transition); text-align: center; }
        .btn-primary { background-color: var(--accent); color: white; }
        .btn-primary:hover { background-color: var(--accent-hover); }
        .btn-secondary { background-color: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); padding: 0.5rem 1rem; font-size: 0.875rem; }
        .btn-secondary:hover { background-color: #f1f5f9; }
    </style>
</head>
<body>
    <div class="app-layout">
        <header class="top-bar">
            <div class="header-content">
                <a href="index.html" class="brand">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21V9a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v12"/><path d="M9 21v-9a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v9"/></svg>
                    <h1>SimplyDoors <span class="fw-normal">Estimator Suite</span></h1>
                </a>
                
                <nav class="app-nav">
                    <a href="index.html" class="nav-link">Catalog Explorer</a>
                    <a href="unroller.html" class="nav-link active">Matrix Unroller</a>
                </nav>

                <div class="header-spacer"></div>
            </div>
        </header>

        <main class="container">
            <section class="input-section">
                <div class="config-panel">
                    <div class="form-group">
                        <label for="categoryInput">Category Name</label>
                        <input type="text" id="categoryInput" placeholder="e.g., Molded Doors" value="Molded Doors">
                    </div>
                    <div class="form-group">
                        <label for="prefixInput">Part Number Prefix</label>
                        <input type="text" id="prefixInput" placeholder="e.g., WGIHCS-" value="WGIHCS-">
                    </div>
                </div>

                <div class="matrix-panel">
                    <label for="matrixInput">
                        Paste Matrix Data (from Excel/Spreadsheet)
                        <span class="help-text">First row must be column headers (Descriptions). First column must be Sizes.</span>
                    </label>
                    <textarea id="matrixInput" placeholder="Size&#9;6 Panel Smooth Slab&#9;6 Panel Smooth Unit&#10;1/6&#9;38.65&#9;81.41&#10;2/0&#9;40.65&#9;83.41"></textarea>
                </div>

                <button id="processBtn" class="btn btn-primary">Process Matrix</button>
            </section>

            <section class="output-section">
                <div class="output-header">
                    <label>Generated JSON Output</label>
                    <button id="copyBtn" class="btn btn-secondary">Copy to Clipboard</button>
                </div>
                <textarea id="jsonOutput" readonly placeholder="Your generated JSON will appear here..."></textarea>
            </section>
        </main>
    </div>

    <script>
        const categoryInput = document.getElementById('categoryInput');
        const prefixInput = document.getElementById('prefixInput');
        const matrixInput = document.getElementById('matrixInput');
        const jsonOutput = document.getElementById('jsonOutput');
        const processBtn = document.getElementById('processBtn');
        const copyBtn = document.getElementById('copyBtn');

        const formatSizeForId = (sizeStr) => sizeStr.replace(/[^0-9]/g, ''); 
        const generateStyleCode = (styleStr) => styleStr.toLowerCase().includes('unit') ? '-UNIT' : '-SLAB';

        const processMatrix = () => {
            const rawData = matrixInput.value.trim();
            if (!rawData) {
                alert("Please paste matrix data first.");
                return;
            }

            const category = categoryInput.value.trim() || "Uncategorized";
            const prefix = prefixInput.value.trim();

            const rows = rawData.split('\n');
            const headers = rows[0].split('\t').map(h => h.trim());
            const finalJSON = [];

            for (let i = 1; i < rows.length; i++) {
                const columns = rows[i].split('\t').map(col => col.trim());
                if (columns.length < 2 || columns[0] === "") continue;

                const size = columns[0]; 
                const sizeId = formatSizeForId(size);

                for (let j = 1; j < columns.length; j++) {
                    const priceStr = columns[j].replace(/[^0-9.]/g, ''); 
                    const price = parseFloat(priceStr);

                    if (isNaN(price) || price === 0) continue;

                    const styleDescription = headers[j];
                    const type = styleDescription.toLowerCase().includes('unit') ? 'Unit' : 'Slab';
                    const styleCode = generateStyleCode(styleDescription);

                    finalJSON.push({
                        id: `${prefix}${sizeId}${styleCode}`,
                        category: category,
                        description: `${size} ${styleDescription}`,
                        price: price,
                        type: type
                    });
                }
            }

            jsonOutput.value = JSON.stringify(finalJSON, null, 4);
        };

        processBtn.addEventListener('click', processMatrix);

        copyBtn.addEventListener('click', () => {
            if (!jsonOutput.value) return;
            navigator.clipboard.writeText(jsonOutput.value).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "Copied!";
                setTimeout(() => { copyBtn.innerText = originalText; }, 2000);
            });
        });
    </script>
</body>
</html>
